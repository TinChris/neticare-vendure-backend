# ============================================
# VENDURE BACKEND - Deploy this FIRST
# PostgreSQL + Vendure Server
# ============================================

services:
  # ----------------------------------------
  # PostgreSQL Database
  # ----------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-vendure}
      POSTGRES_USER: ${DB_USERNAME:-vendure}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-vendure} -d ${DB_NAME:-vendure}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - vendure-network

  # ----------------------------------------
  # Vendure Backend Server
  # ----------------------------------------
  vendure-server:
    build:
      context: ./my-vendure
      dockerfile: Dockerfile
    environment:
       # vendure-config.ts liest:
      # host: process.env.DATABASE_HOST
      # port: process.env.DATABASE_PORT
      # username: process.env.POSTGRES_USER
      # password: process.env.POSTGRES_PASSWORD
      DATABASE_HOST: database
      DATABASE_PORT: 5432
      POSTGRES_USER: vendure
      POSTGRES_PASSWORD: password
      COOKIE_SECRET: ${COOKIE_SECRET}
    ports:
      - "3000:3000" 
    
    depends_on:
      postgres:
        condition: service_healthy

    volumes:
      - vendure_assets:/app/static/assets
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 30

      start_period: 60s
    networks:
      - vendure-network
    restart: unless-stopped
volumes:
  postgres_data:
    name: vendure_postgres_data
  vendure_assets:
    name: vendure_assets

