services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vendure
      POSTGRES_USER: vendure
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vendure"]
      interval: 10s
      timeout: 5s
      retries: 5

  vendure-server:
    build:
      context: ./my-vendure
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=vendure
      - DB_USERNAME=vendure
      - DB_PASSWORD=${DB_PASSWORD}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - SUPERADMIN_USERNAME=superadmin
      - SUPERADMIN_PASSWORD=${SUPERADMIN_PASSWORD}

    ports:
      - "10.0.11.132:3000:3000"


    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - vendure_assets:/app/static/assets
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  vendure-worker:
    build:
      context: ./my-vendure
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=vendure
      - DB_USERNAME=vendure
      - DB_PASSWORD=${DB_PASSWORD}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - SUPERADMIN_USERNAME=superadmin
      - SUPERADMIN_PASSWORD=${SUPERADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - vendure_assets:/app/static/assets
    command: ["node", "dist/index-worker.js"]


volumes:
  postgres_data:
  vendure_assets:
